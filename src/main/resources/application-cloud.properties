spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.hikari.maximum-pool-size=${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:3}
spring.datasource.hikari.minimum-idle=${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:0}
spring.datasource.hikari.connection-timeout=${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT:30000}
spring.datasource.hikari.idle-timeout=${SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT:60000}
spring.datasource.hikari.max-lifetime=${SPRING_DATASOURCE_HIKARI_MAX_LIFETIME:600000}
spring.flyway.locations=classpath:db/migration/common,classpath:db/migration/postgresql
spring.thymeleaf.cache=true
server.port=${PORT:8080}
server.forward-headers-strategy=framework

schedule.security.access-gate.enabled=true
schedule.security.access-gate.password=${SCHEDULE_ACCESS_PASSWORD}
schedule.holidays.cache-days=${SCHEDULE_HOLIDAYS_CACHE_DAYS:30}
schedule.holidays.sync-enabled=${SCHEDULE_HOLIDAYS_SYNC_ENABLED:true}
