<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${mode == 'SET' ? '休み設定確認' : '休み解除確認'}">休み設定確認</title>
    <link rel="stylesheet" th:href="@{/css/app.css(v=5)}">
</head>
<body class="form-page">
<header class="form-header">
    <p class="page-kicker" th:text="${mode == 'SET' ? '休み設定確認' : '休み解除確認'}">休み設定確認</p>
    <h1 th:text="${dateTitle}">2026年6月24日（水）</h1>
</header>

<main class="form-main">
    <section class="cancel-confirmation day-off-confirmation">
        <div th:if="${mode == 'SET'}">
            <p th:if="${confirmation.hasRequests() and !secondStep}" class="cancel-warning">
                この日を休みにすると、以下の案件と下書きが削除されます。件数を確認して次へ進んでください。
            </p>
            <p th:if="${confirmation.hasRequests() and secondStep}" class="cancel-warning">
                最終確認です。この日を休みにして、表示中の案件と下書きを削除します。
            </p>
            <p th:unless="${confirmation.hasRequests()}" class="cancel-warning">
                この日を休みにします。休み中はすべてのセルから入力できません。
            </p>
            <dl>
                <div><dt>公開案件</dt><dd th:text="${confirmation.publishedCount + '件'}">0件</dd></div>
                <div><dt>下書き</dt><dd th:text="${confirmation.draftCount + '件'}">0件</dd></div>
                <div><dt>削除合計</dt><dd th:text="${confirmation.totalCount() + '件'}">0件</dd></div>
            </dl>
        </div>

        <div th:if="${mode == 'UNSET'}">
            <p class="cancel-warning">この日の休み設定を解除します。</p>
            <p>解除後は空白セルから新しい案件を入力できます。</p>
        </div>

        <div class="confirmation-actions">
            <a th:href="${scheduleUrl}" class="back-submit">一覧へ戻る</a>
            <form th:if="${mode == 'SET' and confirmation.hasRequests() and !secondStep}"
                  th:action="@{/schedule/day-offs/confirm}" method="post">
                <input type="hidden" name="date" th:value="${date}">
                <button type="submit" class="danger-button">削除件数を確認して次へ</button>
            </form>
            <form th:if="${mode == 'SET' and (!confirmation.hasRequests() or secondStep)}"
                  th:action="@{/schedule/day-offs}" method="post">
                <input type="hidden" name="date" th:value="${date}">
                <button type="submit" class="danger-button">休みにする</button>
            </form>
            <form th:if="${mode == 'UNSET'}"
                  th:action="@{/schedule/day-offs/{date}/delete(date=${date})}" method="post">
                <button type="submit" class="danger-button">休みを解除</button>
            </form>
        </div>
    </section>
</main>
</body>
</html>
