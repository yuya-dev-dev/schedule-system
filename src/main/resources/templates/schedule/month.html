<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${schedule.title + ' スケジュール'}">スケジュール</title>
    <link rel="stylesheet" th:href="@{/css/app.css(v=11)}">
    <script defer th:src="@{/js/schedule-month.js(v=1)}"></script>
</head>
<body class="schedule-page">
<a class="skip-link" href="#main-content">本文へ移動</a>
<header class="page-header">
    <div>
        <p class="page-kicker">配送・設置案件</p>
        <h1 th:text="${schedule.title + ' スケジュール'}">2026年6月 スケジュール</h1>
    </div>
    <form class="month-picker" method="get" th:action="@{/schedule}" aria-label="年月を選択">
        <label class="month-picker-field" for="month-picker-year">
            <span>年</span>
            <input id="month-picker-year" name="year" type="number" min="1" required
                   inputmode="numeric" th:value="${schedule.selectedYear}">
        </label>
        <label class="month-picker-field" for="month-picker-month">
            <span>月</span>
            <select id="month-picker-month" name="monthNumber" required>
                <option th:each="number : ${#numbers.sequence(1, 12)}"
                        th:value="${number}"
                        th:text="${number + '月'}"
                        th:selected="${number == schedule.selectedMonthNumber}">1月</option>
            </select>
        </label>
        <button type="submit">表示</button>
    </form>
    <p th:if="${monthSelectionError}" class="month-picker-error" role="alert"
       th:text="${monthSelectionError}">正しい年と月を入力してください</p>
</header>

<main id="main-content" tabindex="-1">
    <div th:if="${notice}" class="schedule-notice" role="status" th:text="${notice}">
        案件はすでに削除されています
    </div>
    <details class="draft-panel" th:open="${!#lists.isEmpty(drafts)}">
        <summary>
            <span>下書き一覧</span>
            <span class="draft-count" th:text="${#lists.size(drafts)}">0</span>
        </summary>
        <p th:if="${#lists.isEmpty(drafts)}" class="draft-empty">保存中の下書きはありません</p>
        <div th:unless="${#lists.isEmpty(drafts)}" class="draft-list">
            <article th:each="draft : ${drafts}" class="draft-item">
                <div class="draft-item-main">
                    <strong th:text="${draft.workDate + ' ' + draft.requesterName}">2026年6月24日 社員A</strong>
                    <span class="draft-reason" th:text="${draft.reason}">入力不足</span>
                    <small th:text="${draft.detail}">開始時間が未入力</small>
                    <small th:text="${'更新 ' + draft.updatedAt}">更新 6月20日 14:30</small>
                </div>
                <div class="draft-actions">
                    <a th:href="@{/requests/drafts/{id}(id=${draft.id})}">入力を再開</a>
                    <form th:action="@{/requests/drafts/{id}/delete(id=${draft.id})}" method="post"
                          onsubmit="return confirm('この下書きを削除しますか？');">
                        <button type="submit">削除</button>
                    </form>
                </div>
            </article>
        </div>
    </details>

    <div class="schedule-scroll" aria-label="月間スケジュール"
         th:data-initial-focus-date="${schedule.initialFocusDate}">
        <table class="schedule-table">
            <thead>
            <tr>
                <th class="time-heading" scope="col">時間</th>
                <th th:each="workDate : ${schedule.workDates}" scope="col"
                    th:data-work-date="${workDate.date}"
                    th:classappend="${(workDate.past ? ' past-date' : '') + (workDate.dayOff ? ' day-off-date' : '')}">
                    <span class="date-label" th:text="${workDate.monthDayLabel}">6/3</span>
                    <span class="weekday-label" th:text="${workDate.weekdayLabel}">水</span>
                    <span th:if="${workDate.dayOff}" class="day-off-badge">休み</span>
                    <span th:if="${!workDate.past}" class="day-off-actions">
                        <a th:if="${!workDate.dayOff}"
                           th:href="@{/schedule/day-offs/new(date=${workDate.date})}">休みにする</a>
                        <a th:if="${workDate.dayOff}"
                           th:href="@{/schedule/day-offs/{date}/delete(date=${workDate.date})}">休み解除</a>
                    </span>
                </th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="row : ${schedule.timeRows}">
                <th class="time-cell" scope="row" th:text="${row.label}">8:30〜9:00</th>
                <td th:each="cell : ${row.cells}"
                    th:classappend="${cell.dayOff ? ' day-off-cell' : ((cell.occupied ? ' occupied color-' + cell.colorIndex : ' empty')
                        + (cell.readOnly ? ' past-cell' : ''))}">
                    <a th:if="${cell.destinationUrl != null}" class="schedule-cell-link"
                       th:href="${cell.destinationUrl}"
                       th:aria-label="${cell.occupied
                            ? (cell.readOnly ? '過去案件を開く' : '案件を開く')
                            : '新しい案件を入力'}">
                        <span th:if="${cell.occupied and cell.firstCell}" class="cell-main">
                            <strong th:text="${#strings.isEmpty(cell.requesterName) ? cell.workTypeName : cell.requesterName}">山本</strong>
                            <small th:if="${!#strings.isEmpty(cell.requesterName)}" th:text="${cell.workTypeName}">設置</small>
                            <small th:if="${cell.incomplete}" class="incomplete">＊未入力</small>
                        </span>
                        <span th:if="${cell.occupied and !cell.firstCell}" class="continuation" aria-hidden="true">↓</span>
                    </a>
                    <span th:unless="${cell.destinationUrl != null}" class="schedule-cell-link blocked-cell"
                          th:aria-label="${cell.dayOff ? '休みのため入力できません' : '過去日のため入力できません'}">
                        <span th:if="${cell.dayOff and cell.firstCell}" class="day-off-label">休み</span>
                    </span>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>

<nav class="month-tabs" aria-label="月の切り替え">
    <a th:each="tab : ${schedule.monthTabs}"
       th:href="@{/schedule(month=${tab.value})}"
       th:text="${tab.label}"
       th:classappend="${tab.selected} ? ' active'"
       th:aria-current="${tab.selected} ? 'page'">2026年6月</a>
</nav>
</body>
</html>
