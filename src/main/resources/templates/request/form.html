<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${dateTitle + ' 案件入力'}">案件入力</title>
    <link rel="stylesheet" th:href="@{/css/app.css(v=10)}">
    <script defer="defer" th:src="@{/js/request-form.js}"></script>
</head>
<body class="form-page request-form-page">
<a class="skip-link" href="#main-content">本文へ移動</a>
<header class="form-header">
    <p class="page-kicker"
       th:text="${readOnly ? '過去案件の閲覧' : (editing ? '案件の確認・編集' : '新しい案件')}">新しい案件</p>
    <h1 th:text="${dateTitle}">2026年6月19日（金）</h1>
</header>

<main id="main-content" class="form-main" tabindex="-1">
    <p th:if="${readOnly}" class="readonly-notice" role="status">
        過去日の案件は閲覧専用です。内容の変更やキャンセルはできません。
    </p>
    <div id="error-summary" th:classappend="${#lists.isEmpty(errors)} ? ' is-hidden'" class="error-summary" role="alert">
        <p th:each="error : ${errors}" th:text="${error}">入力内容を確認してください</p>
    </div>

    <form id="request-form" th:action="@{/requests/save}" th:object="${form}" method="post" class="request-form"
          data-autosave-url="/requests/autosave" th:data-schedule-url="${scheduleUrl}"
          th:data-read-only="${readOnly}">
        <input type="hidden" th:field="*{id}">
        <input type="hidden" th:field="*{version}">
        <input type="hidden" th:field="*{workDate}">

        <div class="save-status-row">
            <div id="save-status" class="save-status" role="status" aria-live="polite"
                 th:text="${readOnly ? '閲覧専用' : '入力内容は自動保存されます'}">
                入力内容は自動保存されます
            </div>
            <button id="retry-save" type="button" class="retry-save" hidden>再試行</button>
        </div>

        <div th:if="${copyAllowed}" class="copy-entry-action">
            <a th:href="@{/requests/{id}/copy(id=${form.id})}">
                この入力内容をほかの日時にコピーする
            </a>
        </div>

        <fieldset class="time-range">
            <legend><span class="required">＊必須</span> 時間範囲</legend>
            <label>
                <span>開始時間</span>
                <select th:field="*{startTime}" th:disabled="${readOnly}" required>
                    <option value="">選択してください</option>
                    <option th:each="time : ${startTimeOptions}" th:value="${time}" th:text="${time}">8:30</option>
                </select>
            </label>
            <span class="range-separator" aria-hidden="true">〜</span>
            <label>
                <span>終了時間</span>
                <select th:field="*{endTime}" th:disabled="${readOnly}" required>
                    <option value="">選択してください</option>
                    <option th:each="time : ${endTimeOptions}" th:value="${time}" th:text="${time}">9:00</option>
                </select>
            </label>
        </fieldset>

        <label class="form-field">
            <span>作業種別</span>
            <select th:field="*{workType}" th:disabled="${readOnly}">
                <option value="">選択してください</option>
                <option th:each="type : ${workTypes}"
                        th:value="${type}"
                        th:text="${type.displayName}">設置</option>
            </select>
        </label>

        <label class="form-field">
            <span><span id="requester-required" class="required" th:hidden="${!requesterRequired}">＊必須</span> 依頼者名</span>
            <input type="text" th:field="*{requesterName}" maxlength="100" placeholder="例：山本"
                   th:required="${requesterRequired}" th:disabled="${readOnly}">
            <small>入庫・商品管理では任意です</small>
        </label>

        <label id="companion-toggle" class="check-field" th:hidden="${form.workType != null and !normalWork}">
            <input type="checkbox" th:field="*{companionRequired}" th:disabled="${readOnly}">
            <span>同行あり</span>
        </label>

        <div id="companion-fields" class="conditional-fields" th:hidden="${!form.companionRequired}">
            <label class="form-field">
                <span><span class="required">＊必須</span> 集合場所</span>
                <input type="text" th:field="*{meetingPlace}" maxlength="300" placeholder="例：名古屋支店"
                       th:disabled="${readOnly}"
                       th:required="${normalWork and form.companionRequired}">
            </label>
            <label class="form-field">
                <span><span class="required">＊必須</span> 出発時間</span>
                <select th:field="*{departureTime}" th:disabled="${readOnly}"
                        th:required="${normalWork and form.companionRequired}">
                    <option value="">選択してください</option>
                    <option th:each="time : ${startTimeOptions}" th:value="${time}" th:text="${time}">8:30</option>
                </select>
            </label>
            <label class="form-field">
                <span>使用車両の指定</span>
                <input type="text" th:field="*{vehicleName}" maxlength="100" placeholder="なければ空欄"
                       th:disabled="${readOnly}">
            </label>
        </div>

        <section id="normal-work-fields" class="form-section" th:hidden="${form.workType != null and !normalWork}">
            <label class="form-field">
                <span><span class="normal-required required" th:hidden="${!normalWork}">＊必須</span> 依頼内容</span>
                <textarea th:field="*{requestDetail}" rows="5" maxlength="4000"
                          th:disabled="${readOnly}"
                          th:required="${normalWork}"
                          placeholder="例：コーヒーサーバー2台の設置。必要な機械・備品をまとめて記入してください"></textarea>
            </label>

            <label class="form-field">
                <span><span id="address-required" class="required"
                            th:hidden="${!normalWork or form.companionRequired}">＊必須</span> 現場住所もしくは会社名</span>
                <input type="text" th:field="*{address}" maxlength="500"
                       placeholder="例：愛知県名古屋市中区○○、株式会社○○"
                       th:disabled="${readOnly}"
                       th:required="${normalWork and !form.companionRequired}">
            </label>

            <label class="form-field">
                <span><span class="normal-required required" th:hidden="${!normalWork}">＊必須</span> 顧客先到着希望時間</span>
                <input type="text" th:field="*{desiredArrivalTime}" maxlength="100"
                       th:disabled="${readOnly}"
                       th:required="${normalWork}"
                       placeholder="例：13時頃、午後かつ17時までならいつでも">
            </label>

            <label class="form-field">
                <span>出庫状況</span>
                <select th:field="*{dispatchStatus}" th:disabled="${readOnly}">
                    <option th:each="status : ${dispatchStatuses}"
                            th:value="${status}" th:text="${status.displayName}">未回答</option>
                </select>
            </label>

            <label class="form-field">
                <span>備考</span>
                <small>例: 現地担当者への連絡、注意事項等あれば</small>
                <textarea th:field="*{note}" rows="4" maxlength="4000" th:disabled="${readOnly}"></textarea>
            </label>
        </section>

        <a th:if="${returnOnly}" th:href="${scheduleUrl}" class="back-submit" title="スケジュール一覧へ戻る">
            <span aria-hidden="true">←</span>
            一覧へ戻る
        </a>
        <button th:unless="${returnOnly}" type="button" class="back-submit" title="保存してスケジュール一覧へ戻る">
            <span aria-hidden="true">←</span>
            一覧へ戻る
        </button>
    </form>

    <div id="destructive-actions" class="destructive-actions" th:hidden="${!editing or readOnly}">
        <form id="draft-delete-form"
              th:action="${editing} ? @{/requests/drafts/{id}/delete(id=${form.id})} : '/requests/drafts/0/delete'"
              method="post" th:hidden="${!draft}"
              onsubmit="return confirm('この下書きを削除しますか？');">
            <button type="submit" class="danger-button">下書きを削除</button>
        </form>
        <a id="cancel-request-link"
           th:href="${editing} ? @{/requests/{id}/cancel(id=${form.id})} : '/requests/0/cancel'"
           th:hidden="${!editing or draft}" class="danger-button">
            依頼をキャンセル
        </a>
    </div>
</main>
</body>
</html>
