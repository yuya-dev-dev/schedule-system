<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${dateTitle + ' 案件入力'}">案件入力</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <script defer="defer" th:src="@{/js/request-form.js}"></script>
</head>
<body class="form-page">
<header class="form-header">
    <p class="page-kicker" th:text="${editing ? '案件の確認・編集' : '新しい案件'}">新しい案件</p>
    <h1 th:text="${dateTitle}">2026年6月19日（金）</h1>
</header>

<main class="form-main">
    <div th:if="${!#lists.isEmpty(errors)}" class="error-summary" role="alert">
        <p th:each="error : ${errors}" th:text="${error}">入力内容を確認してください</p>
    </div>

    <form th:action="@{/requests/save}" th:object="${form}" method="post" class="request-form">
        <input type="hidden" th:field="*{id}">
        <input type="hidden" th:field="*{version}">
        <input type="hidden" th:field="*{workDate}">

        <fieldset class="time-range">
            <legend><span class="required">＊必須</span> 時間範囲</legend>
            <label>
                <span>開始時間</span>
                <select th:field="*{startTime}" required>
                    <option value="">選択してください</option>
                    <option th:each="time : ${startTimeOptions}" th:value="${time}" th:text="${time}">8:30</option>
                </select>
            </label>
            <span class="range-separator" aria-hidden="true">〜</span>
            <label>
                <span>終了時間</span>
                <select th:field="*{endTime}" required>
                    <option value="">選択してください</option>
                    <option th:each="time : ${endTimeOptions}" th:value="${time}" th:text="${time}">9:00</option>
                </select>
            </label>
        </fieldset>

        <label class="form-field">
            <span>作業種別</span>
            <select th:field="*{workType}">
                <option value="">選択してください</option>
                <option th:each="type : ${workTypes}"
                        th:value="${type}"
                        th:text="${type.displayName}">設置</option>
            </select>
        </label>

        <label class="form-field">
            <span><span id="requester-required" class="required" th:hidden="${!requesterRequired}">＊必須</span> 依頼者名</span>
            <input type="text" th:field="*{requesterName}" maxlength="100" placeholder="例：山本" th:required="${requesterRequired}">
            <small>入庫・商品管理では任意です</small>
        </label>

        <button type="submit" class="back-submit" title="保存してスケジュール一覧へ戻る">
            <span aria-hidden="true">←</span>
            一覧へ戻る
        </button>
    </form>
</main>
</body>
</html>
