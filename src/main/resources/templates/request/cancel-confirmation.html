<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>依頼キャンセル確認</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="form-page">
<header class="form-header">
    <p class="page-kicker">依頼キャンセル確認</p>
    <h1 th:text="${dateTitle}">2026年6月19日（金）</h1>
</header>

<main class="form-main">
    <section class="cancel-confirmation">
        <p class="cancel-warning">この依頼を削除すると元に戻せません。内容を確認してください。</p>
        <dl>
            <div><dt>時間範囲</dt><dd th:text="${request.startTime + '〜' + request.endTime}">10:00〜12:00</dd></div>
            <div><dt>依頼者名</dt><dd th:text="${#strings.isEmpty(request.requesterName) ? '未入力' : request.requesterName}">社員A</dd></div>
            <div><dt>作業種別</dt><dd th:text="${request.workType == null ? '未入力' : request.workType.displayName}">設置</dd></div>
        </dl>
        <div class="confirmation-actions">
            <a th:href="@{/requests/{id}(id=${request.id})}" class="back-submit">案件へ戻る</a>
            <form th:action="@{/requests/{id}/cancel(id=${request.id})}" method="post">
                <button type="submit" class="danger-button">キャンセルを実行</button>
            </form>
        </div>
    </section>
</main>
</body>
</html>
